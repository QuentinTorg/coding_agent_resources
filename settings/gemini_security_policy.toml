# safe docker commands
[[rule]]
toolName = "run_shell_command"
decision = "allow"
priority = 100
commandPrefix = [
    "docker image ls",
    "docker image list",
    "docker image inspect",
    "docker image history",
    "docker images",
    "docker container ls",
    "docker container list",
    "docker container ps",
    "docker ps",
    "docker logs",
    "docker version",
    "docker info",
    "docker system info",
    "docker inspect",
    "docker stats",
    "docker container stats",
    "docker top",
    "docker container top",

    "docker compose logs",
    "docker compose ls",
    "docker compose ps",
    "docker compose stats",
    "docker compose top",
    "docker compose version",
    "docker compose volumes",
    "docker compose wait"
]



# RESTRICTIONS
## Ask user

# Block common exfiltration tools
[[rule]]
toolName = "run_shell_command"
commandPrefix = ["curl", "wget", "nc", "netcat", "nmap", "ssh"]
decision = "ask_user"
priority = 900

# Block privilege escalation
[[rule]]
toolName = "run_shell_command"
commandPrefix = ["sudo", "su ", "chmod 777", "chown "]
decision = "ask_user"
priority = 950


# RESTRICTIONS
## Always deny

# never allow reboot or shutdown of the host
[[rule]]
toolName = "run_shell_command"
commandRegex = "^(shutdown|reboot)"
decision = "deny"
priority = 999

# Block reading sensitive system files and secrets
[[rule]]
toolName = ["read_file", "grep_search", "glob"]
argsPattern = "(\\.env|/etc/shadow|/etc/passwd|\\.ssh/|\\.aws/|\\.logqs/)"
decision = "deny"
priority = 900
deny_message = "Access to system secrets and environment variables is prohibited."

# Block infinite data streams via prefix match
[[rule]]
toolName = "run_shell_command"
commandPrefix = ["cat /dev/urandom", "cat /dev/zero", "cat /dev/full"]
decision = "deny"
priority = 950
deny_message = "Infinite-stream commands are blocked."

# Block root and home directory deletion
[[rule]]
toolName = "run_shell_command"
commandRegex = "\\brm\\b(?=[\\s\\S]*\\s(?:/|/\\*|~|~/|~/\\*|\\$HOME|\\$HOME/|\\$HOME/\\*)(?:\\s|$))"
# match with any `rm` command with any set of args if any of these paths are included /, /*, ~, ~/, ~/*
decision = "deny"
priority = 950
deny_message = "Destructive root and home directory deletion is blocked."

# Block any unbounded wildcard deletion
[[rule]]
toolName = "run_shell_command"
commandRegex = "\\brm\\b(?=[\\s\\S]*\\s\\*(?:\\s|$))"
# match with any `rm` command with any set of arguments if a plain `*` is included
decision = "deny"
priority = 950
deny_message = "Deletion with unconstrained relative wildcards is blocked. Use specific file paths to prevent accidental deletion. (Note: constrained wildcards such as `rm -rf /some/path/*` are allowed)"

