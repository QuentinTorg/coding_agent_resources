# common shell commands
[[rule]]
toolName = "run_shell_command"
decision = "allow"
priority = 100
commandPrefix = [
    "cd",
    "pwd",
    "grep",
    "cat",
    "ls",
    "true",
    "echo",
    "tail",
    "head",
    "diff",
    "file",
    "stat",
    "timeout",
    "sleep",
    "jq",
    "wc",
    "tree",
    "df",
    "dh"
]

# Allow find as long as it doesn't use any file mutation args
[[rule]]
toolName = "run_shell_command"
decision = "allow"
priority = 100
commandRegex = "\\bfind\\b(?!.*\\s-(?:exec|execdir|ok|okdir|delete|fls|fprint|fprint0|fprintf)\\b)"
# match any "find" command that doesn't have any of the listed args prefixed by a space and `-`

# Allow sed as long as it is only used to query partial lines of code from a file
[[rule]]
toolName = "run_shell_command"
decision = "allow"
priority = 100
commandRegex = "\\bsed\\s+(?:-n|-ne|-n -e)\\s+(?:['\"]?\\d+p['\"]?|['\"]?\\d+,\\d+p['\"]?)\\s+[a-zA-Z0-9_./-]+"
# match "sed" commands that pass the arguments -n (optionally with -e), along with a line number block

# Allow date as long as it doesn't use any flags to set the system time
[[rule]]
toolName = "run_shell_command"
decision = "allow"
priority = 100
commandRegex = "\\bdate\\b(?!.*\\s-s)(?!.*\\s--set)(?!.*\\s\\d{8,})"
# match any "date" command that doesn't have the -s or --set flags, and doesn't contain a string of 8 or more digits

# git commands
[[rule]]
toolName = "run_shell_command"
decision = "allow"
priority = 100
commandPrefix = [
    # core state and history
    "git status",
    "git log",
    "git shortlog",
    "git show",
    "git diff",
    "git blame",

    "git ls-files",
    "git ls-tree",
    "git cat-file",
    "git rev-parse",
    "git diff-index",
    "git diff-tree",

    "git grep",
    "git branch",
    "git tag --list",

    "git ls-remote",
    "git remote -v",
    "git remote show"
]

